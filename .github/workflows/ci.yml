name: CI

on:
  push:
    branches: [main, enterprise-audit-v1, "ci/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------- Frontend ----------
  frontend:
    name: Frontend — lint • build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      # Frontend is JSX (not TSX). Lint + build serve as the de-facto type check;
      # Vite fails fast on actual errors during the build step.
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: "https://api.example.com"
          VITE_LEAD_API_URL: "https://leads.example.com"
          VITE_BACKEND_ENABLED: "true"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ---------- Backend ----------
  backend:
    name: Backend — lint • typecheck • build • migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: enix
          POSTGRES_PASSWORD: enix
          POSTGRES_DB: enix_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U enix"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Install Postgres extensions
        env:
          PGPASSWORD: enix
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client
          psql -h localhost -U enix -d enix_test -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp"; CREATE EXTENSION IF NOT EXISTS pgcrypto;'
      - name: Run migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://enix:enix@localhost:5432/enix_test
          NODE_ENV: test
      - name: Tests
        run: npm test --if-present
        env:
          DATABASE_URL: postgres://enix:enix@localhost:5432/enix_test
          NODE_ENV: test
          JWT_ACCESS_SECRET: ${{ secrets.TEST_JWT_ACCESS_SECRET || 'ci-test-access-secret-do-not-use-in-prod-32+chars' }}
          JWT_REFRESH_SECRET: ${{ secrets.TEST_JWT_REFRESH_SECRET || 'ci-test-refresh-secret-do-not-use-in-prod-32+chars' }}

  # ---------- Leads-API ----------
  leads-api:
    name: Leads-API — typecheck (Bun)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./leads-api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile || bun install
      - name: Typecheck
        run: bun run typecheck
      - name: Tests
        run: bun test --if-present || true

  # ---------- Dependency Audit ----------
  audit:
    name: npm audit (HIGH+CRITICAL = fail)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend, leads-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Audit ${{ matrix.component }}
        working-directory: ./${{ matrix.component }}
        run: |
          npm audit --omit=dev --audit-level=high || \
            (echo "::error::HIGH or CRITICAL vulnerability in ${{ matrix.component }}" && exit 1)

  # ---------- License Compliance ----------
  license-check:
    name: License compliance (no GPL/AGPL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        component: [frontend, backend, leads-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: ./${{ matrix.component }}
        run: npm install --no-audit --no-fund --omit=dev
      - name: Install license-checker
        run: npm install -g license-checker-rseidelsohn
      - name: Check licenses
        working-directory: ./${{ matrix.component }}
        run: |
          license-checker-rseidelsohn \
            --production \
            --excludePrivatePackages \
            --failOn "GPL-2.0;GPL-3.0;AGPL-1.0;AGPL-3.0;LGPL-2.0;LGPL-3.0" \
            --summary

  # ---------- Secret Scanning ----------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------- Final gate ----------
  ci-success:
    name: ✅ All checks passed
    needs: [frontend, backend, leads-api, audit, license-check, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All CI checks passed."
